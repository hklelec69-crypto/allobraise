name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Check inline JS syntax (index.html)
        run: node .github/scripts/check-inline-js.js

      - name: Check v5-messagerie.js syntax
        run: node --check v5-messagerie.js

      - name: Run unit tests
        run: npm test

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # --branch=main FORCE le déploiement PRODUCTION : en CI le checkout est
          # en detached HEAD, wrangler ne détecte pas la branche et publiait en
          # PREVIEW (URL à hash) → la prod allobraise.pages.dev restait figée.
          command: pages deploy . --project-name=allobraise --branch=main --commit-dirty=true
