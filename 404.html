<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page introuvable — Allo Braise</title>
<meta name="robots" content="noindex, follow">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><text y='26' font-size='28'>🔥</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,700;1,400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'DM Sans',sans-serif;background:#0E0A06;color:#FAFAF7;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:2rem;background:radial-gradient(circle at 50% 30%,#2A1810 0%,#0E0A06 70%)}
  .wrap{max-width:520px}
  .flame{font-size:4.5rem;line-height:1;margin-bottom:1rem}
  .code{font-family:'Fraunces',serif;font-size:clamp(3.5rem,12vw,6rem);font-weight:700;color:#FF8C42;line-height:1;letter-spacing:-2px}
  h1{font-family:'Fraunces',serif;font-size:clamp(1.5rem,5vw,2rem);font-weight:700;margin:0.5rem 0 0.8rem}
  p{color:#B8AE9E;font-size:1.05rem;line-height:1.5;margin-bottom:2rem}
  .btn{display:inline-block;background:linear-gradient(135deg,#D4420A,#F05A1A);color:#fff;text-decoration:none;font-weight:600;padding:0.9rem 2rem;border-radius:999px;transition:transform .15s ease,box-shadow .15s ease;box-shadow:0 8px 24px rgba(212,66,10,.35)}
  .btn:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(212,66,10,.5)}
</style>
</head>
<body>
  <main class="wrap">
    <div class="flame">🔥</div>
    <div class="code">404</div>
    <h1>Cette page a fini en cendres</h1>
    <p>La page que vous cherchez n'existe pas ou a été déplacée. Retournez à l'accueil pour trouver votre expert BBQ.</p>
    <a class="btn" href="/">← Revenir à l'accueil</a>
  </main>
</body>
</html>
